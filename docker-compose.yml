services:
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    container_name: dodirtim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kanban_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strong_password}
      POSTGRES_DB: ${DB_NAME:-kanbandb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kanban_user} -d ${DB_NAME:-kanbandb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go бэкенд
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dodirtim-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-kanban_user}
      DB_PASSWORD: ${DB_PASSWORD:-strong_password}
      DB_NAME: ${DB_NAME:-kanbandb}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # React фронтенд
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dodirtim-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local